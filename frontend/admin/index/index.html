<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login | FreshLink</title>
    <meta name="description" content="FreshLink admin login for project coordination staff.">
    <link rel="stylesheet" href="/landing_page/css/landing.css">
    <link rel="stylesheet" href="/landing_page/css/register.css">
    <script src="/shared/api.js" defer></script>
    <script src="/admin/js/admin-login.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav container" aria-label="Admin login navigation">
        <a class="brand" href="/landing_page/index.html" aria-label="FreshLink home">
          <span class="brand-mark" aria-hidden="true">FL</span>
          <span>FreshLink</span>
        </a>

        <div class="nav-links">
          <a href="/landing_page/index.html">Home</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="auth-hero">
        <div class="container auth-heading">
          <p class="eyebrow">Admin access</p>
          <h1>FreshLink admin login.</h1>
          <p>
            This area is for project administrators who manage farmer records, tomato harvest
            forecasts, coordination plans, and pilot monitoring.
          </p>
        </div>
      </section>

      <section class="login-section">
        <div class="container">
          <article class="register-card login-card">
            <div class="register-card-header">
              <p class="eyebrow">Administrator</p>
              <h2>Access admin dashboard</h2>
            </div>

            <form class="register-form" id="admin-login-form" action="#" method="post">
              <label for="admin-login-id">Username or email</label>
              <input id="admin-login-id" name="login_id" type="text" placeholder="Admin username or email" required>

              <label for="admin-password">Password</label>
              <input id="admin-password" name="password" type="password" placeholder="Enter your password" required>

              <button class="button button-primary" type="submit">Login as Admin</button>
            </form>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
